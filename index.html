<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alhidaya Election Commission | Google Sheets Voting System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2e38 0%, #1a5a6e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 { color: white; font-size: 1.6rem; }
        .header h1 i { color: #ffd966; margin-right: 12px; }
        .google-badge {
            background: #0F9D58;
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .dashboard-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid #ffd966;
            padding: 10px 24px;
            border-radius: 50px;
            color: #ffd966;
            cursor: pointer;
            font-weight: 600;
        }
        .glass-card {
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
        }
        .position-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2edf2;
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .pos-tab {
            flex: 1;
            padding: 12px 20px;
            background: none;
            border: none;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            color: #5a6e7c;
        }
        .pos-tab.active { background: #2c7da0; color: white; }
        .pos-tab.completed { background: #1f6e43; color: white; }
        .pos-tab.completed::after { content: " ✓"; }
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }
        .candidate-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .candidate-card.selected {
            border-color: #1f6e43;
            background: linear-gradient(145deg, #ffffff, #f0fff4);
        }
        .candidate-card:hover { transform: translateY(-6px); }
        .candidate-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .party-logo {
            width: 45px;
            height: 45px;
            margin: 10px auto;
            background: white;
            border-radius: 30px;
            padding: 5px;
        }
        .candidate-name { font-size: 1.2rem; font-weight: 800; margin: 8px 0; }
        .select-btn {
            background: #2c7da0;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            margin-top: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        .btn-primary {
            background: linear-gradient(95deg, #1f6e43, #0f8b5e);
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-secondary {
            background: #475569;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .input-modern {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e2edf2;
            border-radius: 60px;
            margin: 10px 0;
            font-size: 1rem;
        }
        .info-message {
            background: #e1f0fa;
            padding: 12px 20px;
            border-radius: 50px;
            margin: 15px 0;
        }
        .stats-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            flex: 1;
            min-width: 150px;
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: 800; color: #1f6e43; }
        .chart-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 2rem 0;
        }
        .chart-box {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 20px;
            padding: 1rem;
        }
        canvas { max-height: 250px; }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .result-table th, .result-table td {
            padding: 12px;
            border-bottom: 1px solid #e2edf2;
            text-align: left;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .success-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
        }
        .success-popup.active { visibility: visible; opacity: 1; }
        .popup-content {
            background: white;
            border-radius: 48px;
            padding: 2.5rem;
            text-align: center;
        }
        .popup-content i { font-size: 4rem; color: #1f6e43; }
        footer { text-align: center; margin-top: 2rem; color: #a0c4e2; }
        .error-text { color: #d9534f; margin-top: 10px; }
        .loading { opacity: 0.6; pointer-events: none; }
        @media (max-width: 700px) {
            .glass-card { padding: 1rem; }
            .candidates-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1><i class="fas fa-landmark"></i> Hidayaa Election Commission</h1>
            <p><i class="fas fa-check-circle"></i> Position Voting | Real-time Google Sheets Sync</p>
        </div>
        <div style="display: flex; gap: 12px;">
            <div class="google-badge"><i class="fab fa-google"></i> Google Sheets</div>
            <button class="dashboard-btn" id="openDashboardBtn"><i class="fas fa-chart-line"></i> Dashboard</button>
        </div>
    </div>

    <div class="glass-card">
        <div id="authSection">
            <div style="max-width: 500px; margin: 0 auto; text-align: center;">
                <i class="fas fa-id-card" style="font-size: 3rem; color: #2c7da0;"></i>
                <h2 style="margin: 15px 0;">Voter Authentication</h2>
                <input type="text" id="voterName" class="input-modern" placeholder="Full Name">
                <input type="text" id="admissionNo" class="input-modern" placeholder="Admission Number">
                <button class="btn-primary" id="authBtn" style="width:100%;"><i class="fas fa-check"></i> Verify & Vote</button>
                <div id="authError" class="info-message" style="display:none; background:#ffe0db;"></div>
            </div>
        </div>

        <div id="votingSection" style="display: none;">
            <div id="welcomeMsg" class="info-message" style="background:#d9f0ec;"></div>
            <div class="position-tabs" id="tabsContainer"></div>
            <div id="candidatesContainer" class="candidates-grid"></div>
            <div class="nav-buttons">
                <button id="prevBtn" class="btn-secondary" style="display: none;"><i class="fas fa-arrow-left"></i> Previous</button>
                <button id="nextBtn" class="btn-primary">Next Position →</button>
            </div>
        </div>
    </div>
    <footer><i class="fab fa-google"></i> All data stored in Google Sheets</footer>
</div>

<div id="successPopup" class="success-popup">
    <div class="popup-content">
        <i class="fas fa-check-circle"></i>
        <h2 style="margin: 15px 0;">✓ Vote Submitted Successfully!</h2>
        <p>Your votes have been recorded in Google Sheets.</p>
        <div id="popupTimer" style="margin-top: 15px; font-weight: 600;">Redirecting...</div>
    </div>
</div>

<div id="dashboardModal" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-lock" style="font-size: 2.5rem; color: #1f6e43;"></i>
        <h2 style="margin: 15px 0;">Admin Dashboard Access</h2>
        <input type="text" id="adminUser" class="input-modern" placeholder="Username">
        <input type="password" id="adminPass" class="input-modern" placeholder="Password">
        <button class="btn-primary" id="dashLoginBtn" style="width:100%;">Unlock Dashboard</button>
        <div id="dashError" class="error-text"></div>
        <button id="closeDashModal" style="margin-top: 20px; background: none; border: none; cursor: pointer;">Close</button>
    </div>
</div>

<div id="dashboardPanel" class="modal-overlay" style="z-index: 2100; background: rgba(0,0,0,0.95);">
    <div style="width: 95%; max-width: 1300px; max-height: 90vh; overflow-y: auto; background: #f8fafc; border-radius: 40px; padding: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2><i class="fas fa-chart-line"></i> Election Dashboard</h2>
            <button id="closeDashPanel" class="btn-secondary">Close</button>
        </div>
        <div id="dashboardContent">Loading...</div>
    </div>
</div>

<script>
    // ============================================================
    // IMPORTANT: REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT URL
    // ============================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyae1UtfgNbjy8TRzitEsrj0u-8_qbpWObtRV63jl4Kr2tTh8DkwBCPL6B3YhMI0A3YYA/exec";
    
    const ADMIN_USER = "alhidaya";
    const ADMIN_PASS = "hudaelection";
    
    const POSITIONS = {
        president: { name: "🏛️ President", candidates: [] },
        secretary: { name: "📝 Secretary", candidates: [] },
        treasurer: { name: "💰 Treasurer", candidates: [] }
    };
    
    const order = ["president", "secretary", "treasurer"];
    let currentPosition = "president";
    let selections = { president: null, secretary: null, treasurer: null };
    let currentVoter = null;
    let charts = {};
    
    function playSound(freq = 780, duration = 0.2) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
            osc.stop(ctx.currentTime + duration);
        } catch(e) {}
    }
    
    async function testConnection() {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL + "?test=1", {
                method: 'GET',
                mode: 'cors'
            });
            const data = await response.json();
            console.log("Connection test:", data);
            return data.status === "active";
        } catch(e) {
            console.error("Connection failed:", e);
            return false;
        }
    }
    
    async function fetchCandidates() {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getCandidates' })
            });
            const data = await response.json();
            if (data.success && data.candidates) {
                POSITIONS.president.candidates = data.candidates.president || [];
                POSITIONS.secretary.candidates = data.candidates.secretary || [];
                POSITIONS.treasurer.candidates = data.candidates.treasurer || [];
                return true;
            }
        } catch(e) { console.error(e); }
        
        // Fallback
        POSITIONS.president.candidates = [
            { id: "p1", name: "Aisha Rahman", party: "Progressive Alliance", photo: "https://randomuser.me/api/portraits/women/68.jpg", logo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" },
            { id: "p2", name: "Omar Farooq", party: "Unity Movement", photo: "https://randomuser.me/api/portraits/men/32.jpg", logo: "https://cdn-icons-png.flaticon.com/512/3069/3069174.png" }
        ];
        POSITIONS.secretary.candidates = [
            { id: "s1", name: "Zainab Malik", party: "Students First", photo: "https://randomuser.me/api/portraits/women/44.jpg", logo: "https://cdn-icons-png.flaticon.com/512/1946/1946484.png" },
            { id: "s2", name: "Rahul Verma", party: "Campus Voice", photo: "https://randomuser.me/api/portraits/men/45.jpg", logo: "https://cdn-icons-png.flaticon.com/512/2972/2972674.png" }
        ];
        POSITIONS.treasurer.candidates = [
            { id: "t1", name: "Fatima Khan", party: "Integrity Party", photo: "https://randomuser.me/api/portraits/women/90.jpg", logo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" },
            { id: "t2", name: "Yusuf Ibrahim", party: "Trust Movement", photo: "https://randomuser.me/api/portraits/men/75.jpg", logo: "https://cdn-icons-png.flaticon.com/512/3069/3069174.png" }
        ];
        return true;
    }
    
    async function checkVoter(admission) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'checkVoter', admissionNo: admission })
            });
            const data = await response.json();
            return data.hasVoted === true;
        } catch(e) { return false; }
    }
    
    async function submitVotes(admission, name, pres, sec, tres) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'saveBulkVote',
                    admissionNo: admission,
                    voterName: name,
                    presidentVote: pres,
                    secretaryVote: sec,
                    treasurerVote: tres
                })
            });
            const data = await response.json();
            return data.success === true;
        } catch(e) {
            console.error("Submit error:", e);
            return false;
        }
    }
    
    async function getResults() {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getResults' })
            });
            const data = await response.json();
            return data.votes || [];
        } catch(e) { return []; }
    }
    
    function renderTabs() {
        const container = document.getElementById("tabsContainer");
        container.innerHTML = "";
        order.forEach(pos => {
            const btn = document.createElement("button");
            btn.className = `pos-tab ${currentPosition === pos ? 'active' : ''} ${selections[pos] ? 'completed' : ''}`;
            btn.innerHTML = POSITIONS[pos].name;
            btn.onclick = () => {
                currentPosition = pos;
                renderTabs();
                renderCandidates();
                updateNavButtons();
                playSound(600, 0.1);
            };
            container.appendChild(btn);
        });
    }
    
    function renderCandidates() {
        const container = document.getElementById("candidatesContainer");
        const candidates = POSITIONS[currentPosition].candidates;
        if (!candidates || candidates.length === 0) {
            container.innerHTML = "<div class='info-message'>Loading candidates...</div>";
            return;
        }
        container.innerHTML = "";
        candidates.forEach(c => {
            const isSelected = selections[currentPosition] === c.id;
            const card = document.createElement("div");
            card.className = `candidate-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `
                <img class="candidate-photo" src="${c.photo}" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'">
                <img class="party-logo" src="${c.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
                <div class="candidate-name">${c.name}</div>
                <div style="color:#2c7da0;">${c.party}</div>
                <button class="select-btn" data-id="${c.id}"><i class="fas fa-check"></i> Vote for ${c.name.split(' ')[0]}</button>
            `;
            const btn = card.querySelector(".select-btn");
            btn.onclick = (e) => {
                e.stopPropagation();
                selections[currentPosition] = c.id;
                renderCandidates();
                renderTabs();
                playSound(660, 0.15);
            };
            container.appendChild(card);
        });
    }
    
    function updateNavButtons() {
        const idx = order.indexOf(currentPosition);
        document.getElementById("prevBtn").style.display = idx === 0 ? "none" : "flex";
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.innerHTML = idx === order.length - 1 ? "✓ Submit All Votes" : "Next Position →";
    }
    
    function showSuccessAndReload() {
        const popup = document.getElementById("successPopup");
        popup.classList.add("active");
        let sec = 3;
        const timer = document.getElementById("popupTimer");
        const interval = setInterval(() => {
            sec--;
            timer.innerHTML = `Redirecting in ${sec} seconds...`;
            if (sec <= 0) {
                clearInterval(interval);
                popup.classList.remove("active");
                window.location.reload();
            }
        }, 1000);
    }
    
    async function handleNext() {
        if (!selections[currentPosition]) {
            alert(`Please select a candidate for ${POSITIONS[currentPosition].name}`);
            playSound(500, 0.2);
            return;
        }
        const idx = order.indexOf(currentPosition);
        if (idx === order.length - 1) {
            if (!order.every(p => selections[p])) {
                alert("Please select candidates for all three positions");
                return;
            }
            const btn = document.getElementById("nextBtn");
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Submitting...";
            
            const success = await submitVotes(
                currentVoter.admission,
                currentVoter.name,
                selections.president,
                selections.secretary,
                selections.treasurer
            );
            
            if (success) {
                playSound(880, 0.3);
                showSuccessAndReload();
            } else {
                alert("❌ Error submitting votes. Please check your network and try again.");
                playSound(500, 0.3);
                btn.disabled = false;
                btn.innerHTML = "✓ Submit All Votes";
            }
        } else {
            currentPosition = order[idx + 1];
            renderTabs();
            renderCandidates();
            updateNavButtons();
            playSound(700, 0.1);
        }
    }
    
    function handlePrev() {
        const idx = order.indexOf(currentPosition);
        if (idx > 0) {
            currentPosition = order[idx - 1];
            renderTabs();
            renderCandidates();
            updateNavButtons();
            playSound(600, 0.1);
        }
    }
    
    async function authenticate() {
        const name = document.getElementById("voterName").value.trim();
        const admission = document.getElementById("admissionNo").value.trim();
        const errorDiv = document.getElementById("authError");
        
        if (!name || !admission) {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "❌ Please enter both Name and Admission Number";
            playSound(500, 0.2);
            return;
        }
        
        const btn = document.getElementById("authBtn");
        btn.disabled = true;
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Verifying...";
        
        const voted = await checkVoter(admission);
        if (voted) {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "❌ This Admission Number has already voted!";
            playSound(500, 0.2);
            btn.disabled = false;
            btn.innerHTML = "<i class='fas fa-check'></i> Verify & Vote";
            return;
        }
        
        errorDiv.style.display = "none";
        currentVoter = { name, admission };
        selections = { president: null, secretary: null, treasurer: null };
        currentPosition = "president";
        
        document.getElementById("authSection").style.display = "none";
        document.getElementById("votingSection").style.display = "block";
        document.getElementById("welcomeMsg").innerHTML = `<i class="fas fa-user-check"></i> Welcome <strong>${name}</strong> (${admission}) — Please vote for all 3 positions`;
        
        renderTabs();
        renderCandidates();
        updateNavButtons();
        playSound(700, 0.15);
        btn.disabled = false;
        btn.innerHTML = "<i class='fas fa-check'></i> Verify & Vote";
    }
    
    async function renderDashboard() {
        const votes = await getResults();
        const total = votes.length;
        const unique = new Set(votes.map(v => v.admissionNo)).size;
        
        const presCount = {}, secCount = {}, tresCount = {};
        POSITIONS.president.candidates.forEach(c => presCount[c.id] = 0);
        POSITIONS.secretary.candidates.forEach(c => secCount[c.id] = 0);
        POSITIONS.treasurer.candidates.forEach(c => tresCount[c.id] = 0);
        
        votes.forEach(v => {
            if (v.presidentVote && presCount[v.presidentVote] !== undefined) presCount[v.presidentVote]++;
            if (v.secretaryVote && secCount[v.secretaryVote] !== undefined) secCount[v.secretaryVote]++;
            if (v.treasurerVote && tresCount[v.treasurerVote] !== undefined) tresCount[v.treasurerVote]++;
        });
        
        const container = document.getElementById("dashboardContent");
        container.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number">${total}</div><div>Total Votes</div></div>
                <div class="stat-card"><i class="fas fa-id-card"></i><div class="stat-number">${unique}</div><div>Unique Voters</div></div>
            </div>
            <div class="chart-container">
                <div class="chart-box"><canvas id="presChart"></canvas><h4>President</h4></div>
                <div class="chart-box"><canvas id="secChart"></canvas><h4>Secretary</h4></div>
                <div class="chart-box"><canvas id="tresChart"></canvas><h4>Treasurer</h4></div>
            </div>
            <table class="result-table"><thead><tr><th>Voter</th><th>Admission</th><th>President</th><th>Secretary</th><th>Treasurer</th></tr></thead><tbody id="dashBody"></tbody></table>
        `;
        
        if (charts.pres) charts.pres.destroy();
        charts.pres = new Chart(document.getElementById("presChart"), {
            type: 'bar', data: { labels: POSITIONS.president.candidates.map(c => c.name), datasets: [{ label: 'Votes', data: POSITIONS.president.candidates.map(c => presCount[c.id]), backgroundColor: '#2c7da0' }] }
        });
        if (charts.sec) charts.sec.destroy();
        charts.sec = new Chart(document.getElementById("secChart"), {
            type: 'bar', data: { labels: POSITIONS.secretary.candidates.map(c => c.name), datasets: [{ label: 'Votes', data: POSITIONS.secretary.candidates.map(c => secCount[c.id]), backgroundColor: '#1f6e43' }] }
        });
        if (charts.tres) charts.tres.destroy();
        charts.tres = new Chart(document.getElementById("tresChart"), {
            type: 'bar', data: { labels: POSITIONS.treasurer.candidates.map(c => c.name), datasets: [{ label: 'Votes', data: POSITIONS.treasurer.candidates.map(c => tresCount[c.id]), backgroundColor: '#e67e22' }] }
        });
        
        const tbody = document.getElementById("dashBody");
        tbody.innerHTML = votes.map(v => `<tr><td>${v.voterName || ''}</td><td>${v.admissionNo || ''}</td><td>${v.presidentVote || '—'}</td><td>${v.secretaryVote || '—'}</td><td>${v.treasurerVote || '—'}</td></tr>`).join("");
    }
    
    // Dashboard modal
    const dashModal = document.getElementById("dashboardModal");
    const dashPanel = document.getElementById("dashboardPanel");
    function openDashboard() { dashModal.classList.add("active"); playSound(700, 0.15); }
    function closeDashboardLogin() { dashModal.classList.remove("active"); }
    function closeDashboardPanel() { dashPanel.classList.remove("active"); }
    async function validateLogin() {
        const u = document.getElementById("adminUser").value, p = document.getElementById("adminPass").value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            dashModal.classList.remove("active");
            await renderDashboard();
            dashPanel.classList.add("active");
            document.getElementById("dashError").innerText = "";
        } else {
            document.getElementById("dashError").innerText = "Invalid credentials!";
            playSound(500, 0.2);
        }
    }
    
    document.getElementById("authBtn").addEventListener("click", authenticate);
    document.getElementById("nextBtn").addEventListener("click", handleNext);
    document.getElementById("prevBtn").addEventListener("click", handlePrev);
    document.getElementById("openDashboardBtn").addEventListener("click", openDashboard);
    document.getElementById("dashLoginBtn").addEventListener("click", validateLogin);
    document.getElementById("closeDashModal").addEventListener("click", closeDashboardLogin);
    document.getElementById("closeDashPanel").addEventListener("click", closeDashboardPanel);
    
    fetchCandidates().then(() => console.log("Candidates loaded"));
    testConnection().then(connected => {
        if (!connected && GOOGLE_SCRIPT_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
            console.warn("Cannot connect to Google Sheets. Check URL and CORS.");
        }
    });
</script>
</body>
</html>
